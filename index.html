<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR 成效報告產生器</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
:root{--bg:#07101f;--surf:#0f1c2e;--surf2:#162440;--card:#0c1828;--bord:#1a2f48;--teal:#0ea5e9;--gold:#f59e0b;--grn:#10b981;--lt:#cbd5e1;--mute:#64748b;--rad:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans TC',sans-serif;background:var(--bg);color:var(--lt);min-height:100vh;padding:2rem 1.5rem;max-width:960px;margin:0 auto}
.hd{margin-bottom:2rem}.hd h1{font-size:1.5rem;font-weight:700;color:#fff;margin-bottom:.3rem}
.hd p{color:var(--mute);font-size:.85rem;line-height:1.6}
.badge{display:inline-block;padding:.15rem .55rem;background:#063f3a;color:#34d399;border-radius:4px;font-size:.72rem;font-weight:600;margin-left:.5rem}
.step{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rad);padding:1.5rem;margin-bottom:1.1rem}
.step-title{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
.snum{width:24px;height:24px;border-radius:50%;background:#0c2b5a;color:var(--teal);font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title h2{font-size:.9rem;font-weight:600;color:#fff}
.step-title p{font-size:.75rem;color:var(--mute);margin-top:.1rem}
label{display:block;font-size:.76rem;color:var(--mute);margin-bottom:.3rem;font-weight:500}
input[type=text],input[type=number],textarea{width:100%;background:var(--bg);border:1px solid var(--bord);border-radius:8px;color:var(--lt);font-size:.88rem;padding:.55rem .75rem;outline:none;font-family:inherit;transition:border-color .15s;resize:vertical}
input:focus,textarea:focus{border-color:var(--teal)}
textarea{line-height:1.6;min-height:110px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}

/* Tab switcher for dual campaigns */
.tab-bar{display:flex;gap:.5rem;margin-bottom:1rem}
.tab{padding:.4rem .9rem;border-radius:6px;border:1px solid var(--bord);background:transparent;color:var(--mute);font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600}
.tab-panel{display:none}.tab-panel.active{display:block}

.btn-a{margin-top:.9rem;padding:.6rem 1.3rem;background:#0c2b5a;border:1px solid var(--teal);border-radius:8px;color:var(--teal);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn-a:hover{background:#0e3d7a}.btn-a:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:.35rem .8rem;background:transparent;border:1px solid var(--bord);border-radius:6px;color:var(--mute);font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .15s;margin-left:.5rem}
.btn-sm:hover{border-color:var(--teal);color:var(--teal)}
.btn-sm.active{border-color:var(--teal);color:var(--teal);background:#0c2b5a}

.res{margin-top:1rem;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:1rem;display:none}
.res.show{display:block}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;margin-bottom:1rem}
.kcard{background:var(--bg);border:1px solid var(--bord);border-radius:8px;padding:.7rem;text-align:center}
.kcard .v{font-size:1.4rem;font-weight:700;color:var(--teal)}.kcard .l{font-size:.7rem;color:var(--mute);margin-top:.15rem}
.mtbl{width:100%;border-collapse:collapse;font-size:.78rem}
.mtbl th{text-align:left;color:var(--mute);font-size:.68rem;text-transform:uppercase;padding:.4rem;border-bottom:1px solid var(--bord)}
.mtbl td{padding:.3rem .4rem;border-bottom:1px solid #0c1828;vertical-align:middle}
.tbadge{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.7rem;font-weight:600}
.tA{background:#063f3a;color:#34d399}.tB{background:#0c2b5a;color:#60a5fa}.tC{background:#1e2435;color:#94a3b8}
.cat-tag{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.68rem;margin-left:.3rem;background:#1a1a2e;color:#a78bfa}
.mstat{font-size:.75rem;color:var(--mute);margin-top:.5rem;padding:.5rem;background:var(--bg);border-radius:6px}
.mstat b{color:var(--teal)}
.btn-gen{width:100%;margin-top:1.4rem;padding:.95rem;background:linear-gradient(135deg,#0284c7,#0369a1);border:none;border-radius:var(--rad);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-gen:hover{opacity:.88}.btn-gen:disabled{opacity:.4;cursor:not-allowed}
.sbar{margin-top:.9rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;display:none}
.sbar.show{display:block}
.sbar.info{background:#0c2b5a;border:1px solid #1d4ed8;color:#93c5fd}
.sbar.ok{background:#052e16;border:1px solid #166534;color:#86efac}
.sbar.err{background:#2a0a0a;border:1px solid #7f1d1d;color:#fca5a5}
.spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.hint{font-size:.72rem;color:var(--mute);margin-top:.35rem}
.divider{border:none;border-top:1px solid var(--bord);margin:1rem 0}
.sec-ttl{font-size:.7rem;color:var(--teal);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
.dual-toggle{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.toggle-label{font-size:.82rem;color:var(--lt);font-weight:500}
.switch{position:relative;width:40px;height:22px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--bord);border-radius:22px;transition:.3s}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--teal)}
input:checked+.slider:before{transform:translateX(18px)}
</style>
</head>
<body>
<div class="hd">
  <h1>📊 PR 成效報告產生器 <span class="badge">免費 · 無需 API Key</span></h1>
  <p>填入 PR TIMES 配信資訊，自動計算廣告換算值，一鍵產出完整成效報告 PPT。</p>
</div>

<!-- STEP 1: Basic Info -->
<div class="step">
  <div class="step-title"><div class="snum">1</div><div><h2>基本資訊</h2><p>活動名稱、新聞稿標題與發稿費用</p></div></div>
  <div class="g2">
    <div><label>活動 / 遊戲名稱</label><input type="text" id="proj" value="日本夢戰"></div>
    <div><label>報告月份</label><input type="text" id="month" value="2025年5月"></div>
  </div>
  <div style="margin-top:.9rem"><label>新聞稿標題</label><input type="text" id="prTitle" placeholder="例：ラングリッサー モバイル 新SSR英雄「レイガ」と「サンガ」実装！"></div>
  <div style="margin-top:.9rem"><label>PR TIMES 新聞稿連結（選填）</label><input type="text" id="prUrl" placeholder="https://prtimes.jp/main/html/rd/p/..."></div>
  <div style="margin-top:.9rem"><label>發稿費用（¥）— 單次或合計</label><input type="number" id="cost" value="30000"></div>
</div>

<!-- STEP 2: Media (with dual campaign toggle) -->
<div class="step">
  <div class="step-title"><div class="snum">2</div><div><h2>媒體轉載名單</h2><p>直接從 PR TIMES 掲載メディア頁面全選複製貼上</p></div></div>

  <div class="dual-toggle">
    <label class="switch"><input type="checkbox" id="dualToggle" onchange="toggleDual()"><span class="slider"></span></label>
    <span class="toggle-label">同月發了兩次稿，合併計算</span>
  </div>

  <!-- Single campaign -->
  <div id="singlePanel">
    <textarea id="mlist1" placeholder="直接複製 PR TIMES 後台整個表格貼上&#10;&#10;番号&#10;媒体名&#10;媒体社名&#10;URL&#10;1&#10;おたくま経済新聞&#10;...&#10;&#10;或只貼媒體名稱，一行一個也行"></textarea>
  </div>

  <!-- Dual campaign -->
  <div id="dualPanel" style="display:none">
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab(1)">第一次配信</button>
      <button class="tab" onclick="switchTab(2)">第二次配信</button>
    </div>
    <div class="tab-panel active" id="tab1">
      <label>第一次配信標題（選填）</label>
      <input type="text" id="title1" placeholder="例：新SSR英雄実装" style="margin-bottom:.7rem">
      <textarea id="mlist1d" placeholder="貼上第一次配信的媒體清單"></textarea>
    </div>
    <div class="tab-panel" id="tab2">
      <label>第二次配信標題（選填）</label>
      <input type="text" id="title2" placeholder="例：コラボイベント開催" style="margin-bottom:.7rem">
      <textarea id="mlist2d" placeholder="貼上第二次配信的媒體清單"></textarea>
    </div>
  </div>

  <p class="hint" style="margin-top:.5rem">✓ 自動整理媒體清單，計算各媒體廣告換算值</p>
  <button class="btn-a" id="matchBtn" onclick="doMatch()">✦ 計算媒體成效</button>

  <div class="res" id="matchRes">
    <div class="sec-ttl">成效分析結果</div>
    <div class="kpis" id="kpiRow"></div>
    <div class="mstat" id="mstat"></div>
    <div style="overflow-x:auto;margin-top:.9rem">
      <table class="mtbl">
        <thead><tr><th>媒體名稱</th><th>梯隊</th><th>類別</th><th>廣告換算值</th></tr></thead>
        <tbody id="mtBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- STEP 3: Comments -->
<div class="step">
  <div class="step-title"><div class="snum">3</div><div><h2>玩家留言（選填）</h2><p>貼上 Twitter/X、巴哈等留言，自動整理成玩家聲音投影片</p></div></div>
  <textarea id="comments" style="min-height:100px" placeholder="「懐かしい！日本で遊べるのか」— Twitter/X&#10;「魔神英雄伝コラボ待ってた」— Twitter/X&#10;巴哈：品質很好，值得一試"></textarea>
</div>

<button class="btn-gen" id="genBtn" onclick="doGenerate()">⬇ 產生並下載 PPT 報告</button>
<div class="sbar" id="sb"></div>

// ── Media category classifier ──
function getCategory(name) {
  const n = name.toLowerCase();
  if(/game|ゲーム|gamer|spark|inside|4gamer|gpara|gamehack|dengeki|famitsu|appbank|gamewith|appmedia/.test(n)) return "遊戲";
  if(/anime|アニメ|manga|マンガ|comic|ナタリー|medery|character/.test(n)) return "動漫";
  if(/nikkei|日経|toyokeizai|東洋経済|president|diamond|newspicks|btob|business|jbpress|forbes/.test(n)) return "商務";
  if(/nhk|tbs|tv|テレビ|ニュース|news|時事|jiji|朝日|読売|毎日|産経|共同|reuters|afp/.test(n)) return "新聞";
  if(/pia|ぴあ|oricon|mantan|walker|ぽぴん|エンタメ|entertainment/.test(n)) return "娛樂";
  return "綜合";
}

function findPrice(name){
  if(PRICES[name]!==undefined)return{price:PRICES[name],key:name,mode:"exact"};
  var norm=name.replace(/[（(][^）)]*[）)]/g,"").trim();
  if(norm!==name&&PRICES[norm]!==undefined)return{price:PRICES[norm],key:norm,mode:"partial"};
  var keys=Object.keys(PRICES);
  for(var i=0;i<keys.length;i++){var k=keys[i];if(k.indexOf(name)!==-1||name.indexOf(k)!==-1)return{price:PRICES[k],key:k,mode:"fuzzy"};}
  var short=name.slice(0,4);
  if(short.length>=4){for(var j=0;j<keys.length;j++){if(keys[j].indexOf(short)===0)return{price:PRICES[keys[j]],key:keys[j],mode:"keyword"};}}
  return null;
}

function getTier(p){return p>=20000?"A梯":p>=8000?"B梯":"C梯";}
function fmt(n){return"¥"+n.toLocaleString();}

// ── Parse raw pasted text → media names ──
function parseNames(raw){
  var lines=raw.split("\n"), names=[], seen={};
  var hasURL=lines.some(function(l){return/^https?:\/\//.test(l.trim());});
  var skip={"番号":1,"媒体名":1,"媒体社名":1,"URL":1,"掲載メディア":1};
  var companyWords=["株式会社","有限会社","合同会社","編集部","グループ"];
  lines.forEach(function(line){
    line=line.trim(); if(!line)return;
    if(hasURL){
      if(/^\d+$/.test(line)||/^https?:\/\//.test(line)||skip[line])return;
      if(companyWords.some(function(w){return line.indexOf(w)!==-1;}))return;
      if(!seen[line]){names.push(line);seen[line]=1;}
    } else {
      line=line.replace(/^\d+\s+/,"");
      var ui=line.indexOf("http"); if(ui>0)line=line.slice(0,ui).trim();
      var cols=line.split(/\t|  +/); var mn=cols[0].trim();
      mn=mn.replace(/\s*(株式会社|有限会社|合同会社).*$/,"").trim();
      if(mn&&!skip[mn]&&!seen[mn]){names.push(mn);seen[mn]=1;}
    }
  });
  return names;
}

// ── Compute stats from name list ──
function computeStats(names){
  var matched=[],unmatched=[];
  names.forEach(function(n){
    var f=findPrice(n);
    if(f)matched.push({name:n,found:f,category:getCategory(n)});
    else unmatched.push({name:n,found:null,category:getCategory(n)});
  });
  var totalAdVal=matched.reduce(function(s,r){return s+r.found.price;},0);
  var tiers={"A梯":[],"B梯":[],"C梯":[]};
  matched.forEach(function(r){tiers[getTier(r.found.price)].push(r);});
  return{matched:matched,unmatched:unmatched,totalAdVal:totalAdVal,tiers:tiers,names:names};
}

  btn.disabled=true;btn.textContent="計算中...";

  var names1=parseNames(raw1);
  var names2=raw2?parseNames(raw2):[];
  var stats1=computeStats(names1);
  var stats2=names2.length?computeStats(names2):null;

  // Merge if dual
  var allMatched=stats1.matched.concat(stats2?stats2.matched:[]);
  var allUnmatched=stats1.unmatched.concat(stats2?stats2.unmatched:[]);
  var allNames=names1.concat(names2);
  var totalAdVal=allMatched.reduce(function(s,r){return s+r.found.price;},0);
  var cost=parseInt(document.getElementById("cost").value)||30000;
  var roi=Math.round(totalAdVal/cost);
  var tiers={"A梯":[],"B梯":[],"C梯":[]};
  allMatched.forEach(function(r){tiers[getTier(r.found.price)].push(r);});

  matchState={matched:allMatched,unmatched:allUnmatched,totalAdVal:totalAdVal,cost:cost,roi:roi,tiers:tiers,names:allNames,
              isDual:isDual,stats1:stats1,stats2:stats2};

  // Render KPIs
  var kpis=[{v:allNames.length+"件",l:"刊登媒體數"},{v:fmt(totalAdVal),l:"廣告換算合計"},{v:"×"+roi,l:"費效倍率"},{v:fmt(cost),l:"發稿費用"}];
  document.getElementById("kpiRow").innerHTML=kpis.map(function(k){
    return"<div class=\"kcard\"><div class=\"v\">"+k.v+"</div><div class=\"l\">"+k.l+"</div></div>";
  }).join("");

  document.getElementById("mstat").innerHTML="共 <b>"+allNames.length+" 件</b>媒體（A梯 "+tiers["A梯"].length+" / B梯 "+tiers["B梯"].length+" / C梯 "+tiers["C梯"].length+" 件）"+(isDual?"　<span style=\"color:#93c5fd\">兩次配信合計</span>":"");

  // Render table
  var tcls={"A梯":"tA","B梯":"tB","C梯":"tC"};
  var rows=allMatched.concat(allUnmatched);
  document.getElementById("mtBody").innerHTML=rows.map(function(r){
    if(r.found){
      var t=getTier(r.found.price);
      var catStyle="background:"+CAT_COLOR[r.category]+"22;color:"+CAT_COLOR[r.category];
      return"<tr><td>"+r.name+"</td><td><span class=\"tbadge "+tcls[t]+"\">"+t+"</span></td><td><span class=\"tbadge\" style=\""+catStyle+"\">"+r.category+"</span></td><td style=\"color:var(--teal);font-weight:600\">"+fmt(r.found.price)+"</td></tr>";
    }
    return"<tr><td>"+r.name+"</td><td>—</td><td>—</td><td style=\"color:#ef4444\">—</td></tr>";
  }).join("");

  document.getElementById("matchRes").className="res show";
  setS("✓ 計算完成！廣告換算合計 "+fmt(totalAdVal)+"，費效倍率 ×"+roi,"ok");
  btn.disabled=false;btn.textContent="↺ 重新計算";
}

function doGenerate(){
  if(!matchState){setS("請先點「計算媒體成效」","err");return;}
  var proj=document.getElementById("proj").value||"PR報告";
  var month=document.getElementById("month").value||"";
  var prTitle=document.getElementById("prTitle").value||"";
  var prUrl=document.getElementById("prUrl").value||"";
  var comments=document.getElementById("comments").value.trim();
  var btn=document.getElementById("genBtn");
  btn.disabled=true;btn.textContent="產生中...";
  setS("<span class=\"spin\"></span>產生 PPT 中，請稍候...","info");

  var ms=matchState;
  var tA=ms.tiers["A梯"],tB=ms.tiers["B梯"],tC=ms.tiers["C梯"];
  var tvA=tA.reduce(function(s,r){return s+r.found.price;},0);
  var tvB=tB.reduce(function(s,r){return s+r.found.price;},0);
  var tvC=tC.reduce(function(s,r){return s+r.found.price;},0);
  var topA=tA.slice().sort(function(a,b){return b.found.price-a.found.price;}).slice(0,3).map(function(r){return r.name;});
  var topB=tB.slice().sort(function(a,b){return b.found.price-a.found.price;}).slice(0,3).map(function(r){return r.name;});

  // Google Display CPM ≈ ¥300, so cost per 1000 views
  // Equivalent Google Display budget = totalAdVal (our換算is already per-page, so use as proxy)
  var googleEq=Math.round(ms.totalAdVal*3.2/10000*10)/10; // GDN roughly 3.2x more expensive per impression

  var findings=[
    "此次 PR 配信共觸達 "+ms.names.length+" 個日本媒體，廣告換算合計達 "+fmt(ms.totalAdVal)+"，費效倍率高達 "+ms.roi+" 倍",
    "A梯高價值媒體（"+topA.join("、")+"等 "+tA.length+" 件）品牌背書效果最強，換算合計 "+fmt(tvA),
    topB.length>0?"遊戲精準媒體（"+topB.join("、")+"等 "+tB.length+" 件）直接觸及目標受眾，換算合計 "+fmt(tvB):"共 "+ms.matched.length+" 件媒體具備廣告換算價值，涵蓋遊戲、新聞、商務三大類別",
    ms.names.length+" 件媒體同步建立反向連結，對官網 SEO 排名具有長期效益（未計入廣告換算值）"
  ];
  var recs=[
    {title:"確認 PR TIMES 後台實際 PV",content:"登入管理畫面查看各媒體實際轉載 PV 數，與本報告換算值進行核對比較"},
    {title:"追蹤社群二次擴散",content:"配信後 7 日內追蹤各媒體社群擴散數量（X 轉推、Yahoo! 引用等），評估實際觸及是否超出換算值"},
    {title:"優化下次媒體組合",content:topB.length>0?"建議優先爭取 "+topB.join("、")+" 等遊戲精準媒體的原創報導，而非僅 PR 稿轉載":"建議下次配信爭取更多遊戲類精準媒體的原創報導，提升目標受眾觸及率"},
    {title:"建立月度追蹤基準",content:"將本次 "+ms.names.length+" 件、"+fmt(ms.totalAdVal)+" 作為基準線，後續每次配信後進行比較，追蹤趨勢變化"}
  ];
  var conclusion=fmt(ms.cost)+" 的 PR TIMES 配信，"+ms.names.length+" 件轉載媒體廣告換算合計 "+fmt(ms.totalAdVal)+"，費效比 "+ms.roi+" 倍。A梯主流媒體（"+tA.length+" 件）兼顧品牌背書，B梯遊戲媒體（"+tB.length+" 件）精準觸及手遊玩家，是低成本高效益的品牌曝光策略，建議持續沿用於每次版本更新及 IP 聯動配信。";

  var quotes=[];
  if(comments){
    comments.split("\n").forEach(function(cl){
      cl=cl.trim(); if(!cl||quotes.length>=3)return;
      var di=cl.lastIndexOf("—");
      quotes.push(di>0?{quote:cl.slice(0,di).trim().replace(/^[「『"']|[」』"']$/g,""),source:cl.slice(di+1).trim()}:{quote:cl.replace(/^[「『"']|[」』"']$/g,""),source:""});
    });
  }

  var nav={findings:findings,recommendations:recs,conclusion:conclusion,voiceQuotes:quotes,
           tvA:tvA,tvB:tvB,tvC:tvC,googleEq:googleEq,prTitle:prTitle,prUrl:prUrl,
           isDual:ms.isDual,stats1:ms.stats1,stats2:ms.stats2,
           title1:document.getElementById("title1")?document.getElementById("title1").value:"",
           title2:document.getElementById("title2")?document.getElementById("title2").value:""};

  setTimeout(function(){
    buildPPT(proj,month,ms,nav).then(function(){
      setS("✅ 完成！已下載 "+proj+"_PR成效報告_"+month+".pptx","ok");
      btn.disabled=false;btn.textContent="⬇ 產生並下載 PPT 報告";
    }).catch(function(e){
      setS("❌ PPT 產生失敗："+e.message,"err");
      console.error(e);
      btn.disabled=false;btn.textContent="⬇ 產生並下載 PPT 報告";
    });
  },100);
}

    box(s,6.5,4.22,6.4,2.93,CARD,SURF,1);
    txt(s,'同等曝光投 Google Display 廣告約需',6.7,4.35,6.0,.4,13,BRIGHT);
    txt(s,'¥'+googleEq+'萬',6.7,4.75,6.0,.65,32,PURPLE,{bold:true});
    txt(s,'換算分布',6.7,5.52,5.9,.38,14,BRIGHT,{bold:true});
    [{lbl:'A梯',val:tvA,col:TEAL},{lbl:'B梯',val:tvB,col:'60A5FA'},{lbl:'C梯',val:tvC,col:MED}].forEach((it,i)=>{
      txt(s,it.lbl,6.7,5.98+i*.52,1.0,.45,14,it.col,{bold:true});
      txt(s,fmt(it.val),7.8,5.98+i*.52,5.0,.45,15,WHITE,{bold:true});
    });
  }

  // ── S7 雙配信比較（有兩次才顯示）─────────
  if(nav.isDual&&nav.stats1&&nav.stats2){
    const s=pres.addSlide(); bg(s); hdr(s,'兩次配信成效比較');
    const s1=nav.stats1, s2=nav.stats2;
    const adv1=s1.totalAdVal, adv2=s2.totalAdVal;
    const lbl1=nav.title1||'第一次配信', lbl2=nav.title2||'第二次配信';

    [[lbl1,s1,adv1,TEAL,0],[lbl2,s2,adv2,GOLD,6.7]].forEach(([lbl,st,adv,col,x])=>{
      box(s,x+.4,1.05,6.0,5.7,CARD,col,2);
      txt(s,lbl,x+.6,1.18,5.6,.45,16,col,{bold:true});
      txt(s,fmt(adv),x+.6,1.72,5.6,.9,38,WHITE,{bold:true});
      txt(s,'廣告換算合計',x+.6,2.65,5.6,.38,13,BRIGHT);
      txt(s,st.names.length+'件',x+.6,3.12,2.5,.65,30,col,{bold:true});
      txt(s,'刊登媒體',x+3.0,3.32,2.8,.38,13,BRIGHT);
      const tstiers=st.tiers||{"A梯":[],"B梯":[],"C梯":[]};
      txt(s,'A梯 '+tstiers['A梯'].length+' 件　B梯 '+tstiers['B梯'].length+' 件　C梯 '+tstiers['C梯'].length+' 件',x+.6,3.88,5.6,.42,14,BRIGHT);
      st.matched.sort((a,b)=>b.found.price-a.found.price).slice(0,4).forEach((r,j)=>{
        box(s,x+.4,4.42+j*.42,6.0,.38,j%2===0?'0A1628':'0D1B2D');
        txt(s,r.name,x+.55,4.48+j*.42,3.8,.3,13,BRIGHT);
        txt(s,fmt(r.found.price),x+4.35,4.48+j*.42,1.8,.3,13,TEAL,{bold:true,align:'right'});
      });
    });

    // Bottom comparison bar
    const total2=adv1+adv2||1;
    box(s,.4,6.9,6.0*.9,.38,TEAL);
    box(s,.4+6.0*.9,6.9,12.5*(adv2/total2)-.2,.38,'F59E0B');
    txt(s,lbl1+' ¥'+Math.round(adv1/10000*10)/10+'萬',.55,6.95,5.5,.28,13,WHITE,{bold:true});
    txt(s,lbl2+' ¥'+Math.round(adv2/10000*10)/10+'萬',6.9,6.95,5.5,.28,13,WHITE,{bold:true});
  }

  // ── S8 玩家聲音 ────────────────────────────
  if(quotes.length>0){
    const s=pres.addSlide(); bg(s); hdr(s,'玩家真實反應');
    const n=Math.min(quotes.length,3), cw=(W-.9)/n;
    const acs=[TEAL,GOLD,GRN];
    quotes.slice(0,3).forEach((q,i)=>{
      const x=.45+i*(cw+.05), ac=acs[i];
      box(s,x,1.05,cw,6.1,CARD,ac,2); box(s,x,1.05,cw,.3,ac);
      txt(s,'"',x+.2,1.35,1,1.1,70,ac,{bold:true,valign:'top'});
      txt(s,q.quote,x+.25,2.5,cw-.4,3.0,14,BRIGHT,{lineSpacingMultiple:1.5});
      if(q.source)txt(s,'— '+q.source,x+.25,5.95,cw-.4,.4,14,ac,{bold:true});
    });
  }

  // ── S9 後續建議 ────────────────────────────
  {
    const s=pres.addSlide(); bg(s); hdr(s,'後續建議　行動事項');
    const cs=[TEAL,GOLD,GRN,PURPLE];
    [{x:.4,y:1.05},{x:6.95,y:1.05},{x:.4,y:4.2},{x:6.95,y:4.2}].forEach(({x,y},i)=>{
      const c=cs[i], r=recs[i]||{title:'',content:''};
      box(s,x,y,6.3,2.85,CARD,c,1.5); box(s,x,y,.65,.65,c);
      txt(s,'0'+(i+1),x,y,.65,.65,18,WHITE,{bold:true,align:'center',valign:'middle'});
      txt(s,r.title,x+.78,y+.12,5.3,.45,15,WHITE,{bold:true});
      txt(s,r.content,x+.2,y+.72,5.9,1.9,13,BRIGHT);
    });
  }

  // ── S10 結論 ───────────────────────────────
  {
    const s=pres.addSlide(); bg(s,'040C1A');
    box(s,0,0,W,.15,TEAL);
    txt(s,'結論',.5,.3,12,.58,26,WHITE,{bold:true});
    txt(s,conclusion,.5,1.08,12.3,2.0,14,BRIGHT,{lineSpacingMultiple:1.7});
    [{val:names.length+'件',lbl:'媒體刊登',col:TEAL},{val:'¥'+Math.round(totalAdVal/10000*10)/10+'萬',lbl:'廣告換算',col:GRN},{val:'×'+roi,lbl:'費效倍率',col:GOLD},{val:fmt(cost),lbl:'發稿費用',col:PURPLE}].forEach((st,i)=>{
      const x=.5+i*3.2;
      box(s,x,3.35,3.0,3.0,CARD,st.col,2);
      txt(s,st.val,x+.1,3.55,2.8,1.5,38,st.col,{bold:true,align:'center'});
      txt(s,st.lbl,x+.1,5.15,2.8,.48,16,BRIGHT,{bold:true,align:'center'});
    });
    txt(s,month+(prTitle?'　'+prTitle:'')+'　PR TIMES 配信成效報告',.5,7.0,12.3,.35,13,MED);
  }

  await pres.writeFile({fileName: name+'_PR成效報告_'+month+'.pptx'});
}

</script>
