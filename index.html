<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR 成效報告產生器</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
:root{--bg:#07101f;--surf:#0f1c2e;--surf2:#162440;--card:#0c1828;--bord:#1a2f48;--teal:#0ea5e9;--gold:#f59e0b;--grn:#10b981;--lt:#cbd5e1;--mute:#475569;--rad:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans TC',sans-serif;background:var(--bg);color:var(--lt);min-height:100vh;padding:2rem 1.5rem;max-width:920px;margin:0 auto}
.hd{margin-bottom:2rem}.hd h1{font-size:1.5rem;font-weight:700;color:#fff;margin-bottom:.3rem}
.hd p{color:var(--mute);font-size:.85rem;line-height:1.6}
.badge{display:inline-block;padding:.15rem .55rem;background:#063f3a;color:#34d399;border-radius:4px;font-size:.72rem;font-weight:600;margin-left:.5rem}
.step{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rad);padding:1.5rem;margin-bottom:1.1rem}
.slbl{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
.snum{width:24px;height:24px;border-radius:50%;background:#0c2b5a;color:var(--teal);font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slbl h2{font-size:.9rem;font-weight:600;color:#fff}.slbl p{font-size:.75rem;color:var(--mute);margin-top:.1rem}
label{display:block;font-size:.76rem;color:var(--mute);margin-bottom:.3rem;font-weight:500}
input[type=text],input[type=number],textarea{width:100%;background:var(--bg);border:1px solid var(--bord);border-radius:8px;color:var(--lt);font-size:.88rem;padding:.55rem .75rem;outline:none;font-family:inherit;transition:border-color .15s;resize:vertical}
input:focus,textarea:focus{border-color:var(--teal)}
textarea{line-height:1.6;min-height:110px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.btn-a{margin-top:.9rem;padding:.6rem 1.3rem;background:#0c2b5a;border:1px solid var(--teal);border-radius:8px;color:var(--teal);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn-a:hover{background:#0e3d7a}.btn-a:disabled{opacity:.4;cursor:not-allowed}
.res{margin-top:1rem;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:1rem;display:none}
.res.show{display:block}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;margin-bottom:1rem}
.kcard{background:var(--bg);border:1px solid var(--bord);border-radius:8px;padding:.7rem;text-align:center}
.kcard .v{font-size:1.4rem;font-weight:700;color:var(--teal)}.kcard .l{font-size:.7rem;color:var(--mute);margin-top:.15rem}
.mtbl{width:100%;border-collapse:collapse;font-size:.78rem}
.mtbl th{text-align:left;color:var(--mute);font-size:.68rem;text-transform:uppercase;padding:.4rem;border-bottom:1px solid var(--bord)}
.mtbl td{padding:.3rem .4rem;border-bottom:1px solid #0c1828;vertical-align:middle}
.tbadge{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.7rem;font-weight:600}
.tA{background:#063f3a;color:#34d399}.tB{background:#0c2b5a;color:#60a5fa}.tC{background:#1e2435;color:#94a3b8}
.mstat{font-size:.75rem;color:var(--mute);margin-top:.5rem;padding:.5rem;background:var(--bg);border-radius:6px}
.mstat b{color:var(--teal)}
.btn-gen{width:100%;margin-top:1.4rem;padding:.95rem;background:linear-gradient(135deg,#0284c7,#0369a1);border:none;border-radius:var(--rad);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-gen:hover{opacity:.88}.btn-gen:disabled{opacity:.4;cursor:not-allowed}
.sbar{margin-top:.9rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;display:none}
.sbar.show{display:block}
.sbar.info{background:#0c2b5a;border:1px solid #1d4ed8;color:#93c5fd}
.sbar.ok{background:#052e16;border:1px solid #166534;color:#86efac}
.sbar.err{background:#2a0a0a;border:1px solid #7f1d1d;color:#fca5a5}
.spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.hint{font-size:.72rem;color:var(--mute);margin-top:.35rem}
.sec-ttl{font-size:.7rem;color:var(--teal);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
</style>
</head>
<body>
<div class="hd">
  <h1>📊 PR 成效報告產生器 <span class="badge">免費 · 無需 API Key</span></h1>
  <p>貼上 PR TIMES 掲載メディア清單，自動比對官方廣告換算基準表（906 媒體），一鍵產出完整 PPT 報告。</p>
</div>
<div class="step">
  <div class="slbl"><div class="snum">1</div><div><h2>基本資訊</h2><p>活動名稱與發稿費用</p></div></div>
  <div class="g2">
    <div><label>活動 / 遊戲名稱</label><input type="text" id="proj" value="日本夢戰"></div>
    <div><label>報告月份</label><input type="text" id="month" value="2025年5月"></div>
  </div>
  <div style="margin-top:.9rem"><label>PR TIMES 發稿費用（¥）</label><input type="number" id="cost" value="30000"></div>
</div>
<div class="step">
  <div class="slbl"><div class="snum">2</div><div><h2>媒體轉載名單</h2><p>直接從 PR TIMES 掲載メディア頁面全選複製貼上，格式不拘</p></div></div>
  <textarea id="mlist" placeholder="直接複製 PR TIMES 後台整個表格貼上&#10;&#10;番号&#10;媒体名&#10;媒体社名&#10;URL&#10;1&#10;おたくま経済新聞&#10;...&#10;&#10;或只貼媒體名稱，一行一個也行"></textarea>
  <p class="hint">✓ 自動去除序號、社名、URL，只保留媒體名稱進行比對</p>
  <button class="btn-a" id="matchBtn" onclick="doMatch()">✦ 比對官方換算表 → 自動計算成效</button>
  <div class="res" id="matchRes">
    <div class="sec-ttl">成效分析結果</div>
    <div class="kpis" id="kpiRow"></div>
    <div class="mstat" id="mstat"></div>
    <div style="overflow-x:auto;margin-top:.9rem">
      <table class="mtbl">
        <thead><tr><th>媒體名稱</th><th>梯隊</th><th>官方換算單價</th><th>備註</th></tr></thead>
        <tbody id="mtBody"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="step">
  <div class="slbl"><div class="snum">3</div><div><h2>玩家留言（選填）</h2><p>貼上 Twitter/X、巴哈等留言，自動整理成玩家聲音投影片</p></div></div>
  <textarea id="comments" style="min-height:100px" placeholder="「懐かしい！日本で遊べるのか」— Twitter/X&#10;「魔神英雄伝コラボ待ってた」— Twitter/X&#10;巴哈：品質很好，值得一試"></textarea>
</div>
<button class="btn-gen" id="genBtn" onclick="doGenerate()">⬇ 產生並下載 PPT 報告</button>
<div class="sbar" id="sb"></div>

}

function findPrice(name) {
  if (PRICES[name] !== undefined) return {price: PRICES[name], key: name, mode: "exact"};
  var norm = name.replace(/[（(][^）)]*[）)]/g, "").trim();
  if (norm !== name && PRICES[norm] !== undefined) return {price: PRICES[norm], key: norm, mode: "partial"};
  var keys = Object.keys(PRICES);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    if (k.indexOf(name) !== -1 || name.indexOf(k) !== -1) return {price: PRICES[k], key: k, mode: "fuzzy"};
  }
  var short = name.slice(0, 4);
  if (short.length >= 4) {
    for (var j = 0; j < keys.length; j++) {
      if (keys[j].indexOf(short) === 0) return {price: PRICES[keys[j]], key: keys[j], mode: "keyword"};
    }
  }
  return null;
}

  ];

    {title:"確認 PR TIMES 後台實際數據", content:"登入管理畫面查看各媒體轉載 PV 數、廣告換算值等實際數字，以本報告官方換算值為基準進行核對"},
    {title:"追蹤社群二次擴散", content:"配信後 7 日內追蹤各媒體的社群二次擴散數量（Twitter/X 轉推、Yahoo! JAPAN 引用等），評估實際觸及"},
    {title:"優化下次媒體組合", content: topB.length > 0 ? "建議優先爭取 " + topB.join("、") + " 等遊戲精準媒體的原創報導，而非僅 PR 稿轉載，提升觸及質量" : "建議下次配信爭取更多遊戲類精準媒體的原創報導"},
    {title:"建立媒體效益追蹤基準", content:"將本次 " + ms.names.length + " 件媒體換算值 " + fmt(ms.totalAdVal) + " 作為基準線，後續每次配信後進行對比追蹤"}
  ];

  var conclusion = fmt(ms.cost) + " 的 PR TIMES 配信，依官方廣告換算基準表，" + ms.names.length + " 件轉載媒體合計廣告換算值達 " + fmt(ms.totalAdVal) + "，費效比 " + ms.roi + " 倍。A梯高流量媒體（" + tA.length + " 件）兼顧品牌背書，B梯遊戲媒體（" + tB.length + " 件）精準觸及目標受眾，是低成本高效益的品牌曝光策略，建議持續沿用於每次版本更新及 IP 聯動配信。";

  var quotes = [];
  if (comments) {
    var clines = comments.split("\n");
    for (var i = 0; i < clines.length && quotes.length < 3; i++) {
      var cl = clines[i].trim();
      if (!cl) continue;
      var di = cl.lastIndexOf("—");
      if (di > 0) quotes.push({quote: cl.slice(0,di).trim().replace(/^[「『"']|[」』"']$/g,""), source: cl.slice(di+1).trim()});
      else quotes.push({quote: cl.replace(/^[「『"']|[」』"']$/g,""), source: ""});
    }
  }

  var nav = {findings:findings, recommendations:recs, conclusion:conclusion, voiceQuotes:quotes, tvA:tvA, tvB:tvB, tvC:tvC};

  setTimeout(function() {
    buildPPT(proj, month, ms, nav).then(function() {
      setS("✅ 完成！已下載 " + proj + "_PR成效報告_" + month + ".pptx", "ok");
      btn.disabled = false; btn.textContent = "⬇ 產生並下載 PPT 報告";
    }).catch(function(e) {
      setS("❌ PPT 產生失敗：" + e.message, "err");
      console.error(e);
      btn.disabled = false; btn.textContent = "⬇ 產生並下載 PPT 報告";
    });
  }, 100);
}

async function buildPPT(name, month, ms, nav) {
  const pres = new PptxGenJS();
  pres.layout = 'LAYOUT_WIDE';
  const W=13.33, H=7.5;
  const {matched,unmatched,totalAdVal,cost,roi,tiers,names} = ms;
  const tierAdVal = {
    'A梯': tiers['A梯'].reduce((s,r)=>s+r.found.price,0),
    'B梯': tiers['B梯'].reduce((s,r)=>s+r.found.price,0),
    'C梯': tiers['C梯'].reduce((s,r)=>s+r.found.price,0)
  };
  const findings   = nav.findings;
  const recs       = nav.recommendations;
  const conclusion = nav.conclusion;
  const quotes     = nav.voiceQuotes || [];
  const tvA = nav.tvA, tvB = nav.tvB, tvC = nav.tvC;

  // helpers
  function bg(s,col){s.background={color:col||C.bg};}
  function rect(s,x,y,w,h,fill){s.addShape('rect',{x,y,w,h,fill:{color:fill},line:{color:fill}});}
  function card(s,x,y,w,h,opts={}){s.addShape('rect',{x,y,w,h,fill:{color:C.card},line:{color:C.bord,width:.75},...opts});}
  function t(s,str,x,y,w,h,opts={}){if(str!==undefined&&str!==null)s.addText(String(str),{x,y,w,h,margin:0,...opts});}
  function hdr(s,title){
    rect(s,0,0,W,.85,C.surf);
    rect(s,0,0,.18,.85,C.teal);
    t(s,title,.38,.15,12,.55,{fontSize:20,color:'FFFFFF',bold:true});
  }
  function bigStat(s,x,y,w,h,val,lbl,col){
    s.addShape('rect',{x,y,w,h,fill:{color:C.card},line:{color:col,width:2}});
    t(s,val,x+.1,y+.15,w-.2,h*.55,{fontSize:32,color:col,bold:true,align:'center'});
    t(s,lbl,x+.1,y+h-.45,w-.2,.35,{fontSize:10,color:'94A3B8',align:'center'});
  }

  // ── S1: COVER ──────────────────────────────
  {
    const s=pres.addSlide();
    bg(s,'050D1A');
    // accent bar top
    rect(s,0,0,W,.08,'0EA5E9');
    // main headline
    t(s,name,.5,1.0,12,.9,{fontSize:48,color:'FFFFFF',bold:true});
    t(s,'PR 轉載配信　成效報告',.5,1.95,12,.65,{fontSize:28,color:'94D8FF'});
    t(s,month,.5,2.7,12,.4,{fontSize:14,color:'64748B'});

    // 4 big KPI cards
    const kpis=[
      {val:'¥'+Math.round(totalAdVal/10000*10)/10+'萬', lbl:'廣告換算合計', col:'0EA5E9'},
      {val:'×'+roi,                                      lbl:'費效倍率',     col:'F59E0B'},
      {val:names.length+'件',                            lbl:'刊登媒體數',   col:'10B981'},
      {val:'¥'+cost.toLocaleString(),                    lbl:'實際發稿費用', col:'6366F1'},
    ];
    kpis.forEach((k,i)=>{
      const x=.5+i*3.18;
      bigStat(s,x,3.6,3.0,2.6,k.val,k.lbl,k.col);
    });

    // ROI callout
    s.addShape('rect',{x:.5,y:6.4,w:12.3,h:.72,fill:{color:'0C1E35'},line:{color:'0EA5E9',width:.5}});
    t(s,'📌  ¥'+cost.toLocaleString()+' 的發稿費用，創造 ¥'+Math.round(totalAdVal/10000*10)/10+'萬 廣告換算效益，投資報酬 '+roi+' 倍',.7,6.45,12,.58,{fontSize:12,color:'E2E8F0',bold:true});
  }

  // ── S2: 核心效益（直接了當）────────────────
  {
    const s=pres.addSlide();
    bg(s);
    hdr(s,'核心效益　一眼看懂');

    // Left: giant ROI
    s.addShape('rect',{x:.4,y:1.0,w:4.2,h:6.15,fill:{color:'081428'},line:{color:'F59E0B',width:2}});
    t(s,'費效倍率',.4,1.25,4.2,.35,{fontSize:11,color:'F59E0B',bold:true,align:'center'});
    t(s,'×'+roi,.4,1.65,4.2,2.8,{fontSize:96,color:'F59E0B',bold:true,align:'center'});
    t(s,'花 ¥'+Math.round(cost/10000)+'萬　換 ¥'+Math.round(totalAdVal/10000*10)/10+'萬',.4,4.5,4.2,.45,{fontSize:13,color:'E2E8F0',bold:true,align:'center'});
    t(s,'廣告換算值 ÷ 發稿費用',.4,5.0,4.2,.35,{fontSize:10,color:'64748B',align:'center'});
    t(s,'（基於 PR TIMES 官方換算基準表）',.4,5.42,4.2,.3,{fontSize:9,color:'475569',align:'center'});

    // Right: 3 highlight stats
    const sts=[
      {val:names.length+'件',sub:'媒體轉載',note:'涵蓋大眾、遊戲、商務三大類別',col:'0EA5E9'},
      {val:tiers['A梯'].length+'件',sub:'A梯高價值媒體',note:'單價¥20,000+ 主流大型媒體',col:'10B981'},
      {val:matched.length+'件',sub:'官方單價比對',note:'換算依據透明，可對外說明',col:'6366F1'},
    ];
    sts.forEach((st,i)=>{
      const y=1.0+i*2.05;
      s.addShape('rect',{x:5.0,y,w:7.9,h:1.85,fill:{color:C.card},line:{color:st.col,width:1.5}});
      t(s,st.val,5.15,y+.1,2.5,1.1,{fontSize:42,color:st.col,bold:true});
      t(s,st.sub,7.6,y+.2,5.1,.45,{fontSize:14,color:'E2E8F0',bold:true});
      t(s,st.note,7.6,y+.65,5.1,.45,{fontSize:10,color:'94A3B8'});
    });
  }

  // ── S3: 梯隊分布 ───────────────────────────
  {
    const s=pres.addSlide();
    bg(s);
    hdr(s,'媒體梯隊分布　廣告換算佔比');

    const total=names.length||1;
    const totalAd=totalAdVal||1;
    const tierDefs=[
      {lbl:'A梯',sub:'主流大型媒體（單價 ¥20,000+）',count:tiers['A梯'].length,adv:tvA,col:'0D9488',tag:'品牌背書最強'},
      {lbl:'B梯',sub:'遊戲 / 中型媒體（¥8,000–20,000）',count:tiers['B梯'].length,adv:tvB,col:'3B82F6',tag:'精準受眾觸及'},
      {lbl:'C梯',sub:'SEO / 補強媒體（¥8,000 未満）',count:tiers['C梯'].length,adv:tvC,col:'64748B',tag:'SEO 長尾效益'},
    ];
    tierDefs.forEach((td,i)=>{
      const x=.4+i*4.28;
      const pA=Math.round(td.adv/totalAd*100);
      s.addShape('rect',{x,y:1.0,w:4.1,h:6.15,fill:{color:C.card},line:{color:td.col,width:2}});
      rect(s,x,1.0,4.1,.65,td.col);
      t(s,td.lbl,x+.18,1.03,2,.6,{fontSize:20,color:'FFFFFF',bold:true});
      t(s,td.sub,x+.18,1.75,3.8,.35,{fontSize:9.5,color:'CBD5E1'});
      t(s,td.tag,x+.18,2.15,3.8,.3,{fontSize:10,color:td.col,bold:true});
      // big number
      t(s,String(td.count),x+.18,2.5,2,1.1,{fontSize:64,color:td.col,bold:true});
      t(s,'件',x+1.65,3.32,1,.35,{fontSize:14,color:'64748B'});
      // ad value
      t(s,'換算金額',x+.18,3.8,3.7,.28,{fontSize:9,color:'64748B'});
      t(s,'¥'+td.adv.toLocaleString(),x+.18,4.08,3.7,.5,{fontSize:20,color:'FFFFFF',bold:true});
      // bar
      t(s,'換算佔比  '+pA+'%',x+.18,4.68,3.7,.3,{fontSize:9.5,color:'94A3B8'});
      rect(s,x+.18,5.05,3.7,.2,'1E3A5F');
      if(pA>0)rect(s,x+.18,5.05,3.7*pA/100,.2,td.col);
      // top media list
      tiers[td.lbl].slice(0,3).forEach((r,j)=>{
        t(s,'・'+r.name,x+.18,5.42+j*.42,3.7,.36,{fontSize:9.5,color:'CBD5E1'});
      });
    });
  }

  // ── S4: 媒體明細表 ─────────────────────────
  {
    const s=pres.addSlide();
    bg(s);
    hdr(s,'媒體廣告換算明細　官方單價一覧');

    const COLS=[3.2,1.0,2.3,4.4];
    const HDR=['媒體名稱','梯隊','廣告換算單價','比對說明'];
    const colX=[.35];
    COLS.forEach((w,i)=>{if(i<COLS.length-1)colX.push(colX[i]+w+.05);});

    rect(s,.35,1.0,12.65,.4,'111E33');
    HDR.forEach((h2,i)=>t(s,h2,colX[i]+.1,1.05,COLS[i],.3,{fontSize:9,color:'0EA5E9',bold:true}));

    const tcls={'A梯':'0D9488','B梯':'3B82F6','C梯':'64748B'};
    const allRows=[...[...matched].sort((a,b)=>b.found.price-a.found.price),...unmatched];
    const maxR=Math.min(allRows.length,12);
    const rH=Math.min(.47,(H-1.65)/maxR);

    allRows.slice(0,maxR).forEach((r,i)=>{
      const y=1.45+i*rH;
      rect(s,.35,y,12.65,rH-.03,i%2===0?'0A1628':'0D1B2D');
      const tier=r.found?getTier(r.found.price):'未知';
      const tc=tcls[tier]||'64748B';
      t(s,r.name,colX[0]+.1,y+.06,COLS[0]-.1,rH-.15,{fontSize:10,color:'E2E8F0',valign:'middle'});
      s.addShape('rect',{x:colX[1]+.05,y:y+.06,w:.82,h:rH-.18,fill:{color:tc},line:{color:tc}});
      t(s,tier,colX[1]+.05,y+.06,.82,rH-.18,{fontSize:8.5,color:'FFFFFF',bold:true,align:'center',valign:'middle'});
      t(s,r.found?'¥'+r.found.price.toLocaleString():'未收錄',colX[2]+.1,y+.06,COLS[2]-.1,rH-.15,{fontSize:10.5,color:r.found?'34D399':'EF4444',bold:!!r.found,valign:'middle'});
      const note=r.found?(r.found.mode==='exact'?'✓ 精確比對':'≈ '+r.found.key.slice(0,18)):'官方表未收錄';
      t(s,note,colX[3]+.1,y+.06,COLS[3]-.1,rH-.15,{fontSize:9,color:'64748B',valign:'middle'});
    });
    if(allRows.length>maxR)t(s,'＊ 共 '+allRows.length+' 件，顯示前 '+maxR+' 件',.35,H-.35,12,.28,{fontSize:9,color:'475569'});
  }

  // ── S5: 費用效益 ────────────────────────────
  {
    const s=pres.addSlide();
    bg(s);
    hdr(s,'費用效益分析　投入 vs 回報');

    // Center: giant comparison
    s.addShape('rect',{x:.4,y:1.05,w:6.1,h:3.05,fill:{color:'081428'},line:{color:'475569',width:.5}});
    t(s,'實際花費',.6,1.15,5,.35,{fontSize:10,color:'64748B'});
    t(s,'¥'+cost.toLocaleString(),.6,1.48,5.5,.9,{fontSize:36,color:'E2E8F0',bold:true});

    // Arrow
    t(s,'▼',.4,2.55,6.1,.6,{fontSize:28,color:'475569',align:'center'});

    s.addShape('rect',{x:.4,y:3.22,w:6.1,h:3.05,fill:{color:'071E10'},line:{color:'10B981',width:2}});
    t(s,'廣告換算合計（官方換算基準表）',.6,3.32,5.5,.35,{fontSize:10,color:'10B981'});
    t(s,'¥'+totalAdVal.toLocaleString(),.6,3.65,5.5,.9,{fontSize:36,color:'34D399',bold:true});
    t(s,'＝ 你的 ¥'+Math.round(cost/10000)+'萬，在市場上值 ¥'+Math.round(totalAdVal/10000*10)/10+'萬',.6,4.6,5.5,.45,{fontSize:11,color:'86EFAC'});

    // Right: ROI + breakdown
    s.addShape('rect',{x:6.85,y:1.05,w:6.1,h:3.05,fill:{color:'0C1A08'},line:{color:'F59E0B',width:3}});
    t(s,'費效倍率',6.85,1.2,6.1,.35,{fontSize:12,color:'F59E0B',bold:true,align:'center'});
    t(s,'×'+roi,6.85,1.5,6.1,2.0,{fontSize:80,color:'F59E0B',bold:true,align:'center'});

    // Breakdown by tier
    s.addShape('rect',{x:6.85,y:4.25,w:6.1,h:2.02,fill:{color:C.card},line:{color:'1A2F48',width:.5}});
    t(s,'換算明細',7.05,4.35,5.7,.3,{fontSize:9,color:'64748B'});
    [
      {lbl:'A梯',val:tvA,col:'0D9488'},
      {lbl:'B梯',val:tvB,col:'3B82F6'},
      {lbl:'C梯',val:tvC,col:'64748B'},
    ].forEach((it,i)=>{
      const y=4.75+i*.44;
      t(s,it.lbl,7.05,y,1,.35,{fontSize:10,color:it.col,bold:true});
      t(s,'¥'+it.val.toLocaleString(),8.1,y,4.6,.35,{fontSize:10,color:'E2E8F0'});
    });

    t(s,'＊ 換算值 = 官方廣告單價合計，非實際流量保證',.4,6.4,12.5,.3,{fontSize:9,color:'334155'});
  }

  // ── S6: 玩家聲音 ────────────────────────────
  if(quotes&&quotes.filter(q=>q.quote).length>0){
    const s=pres.addSlide();
    bg(s);
    hdr(s,'玩家真實反應');
    const validQ=quotes.filter(q=>q.quote).slice(0,3);
    const cw=(W-.9)/validQ.length;
    const acs=['0EA5E9','F59E0B','10B981'];
    validQ.forEach((q,i)=>{
      const x=.45+i*(cw+.05);
      const ac=acs[i];
      s.addShape('rect',{x,y:1.05,w:cw,h:6.1,fill:{color:C.card},line:{color:ac,width:2}});
      rect(s,x,1.05,cw,.3,ac);
      t(s,'"',x+.2,1.35,1,1.0,{fontSize:64,color:ac,bold:true,valign:'top'});
      t(s,q.quote,x+.25,2.4,cw-.4,3.2,{fontSize:13,color:'F1F5F9',lineSpacingMultiple:1.5});
      if(q.source)t(s,'— '+q.source,x+.25,5.95,cw-.4,.35,{fontSize:10,color:ac,bold:true});
    });
  }

  // ── S7: 後續建議 ────────────────────────────
  {
    const s=pres.addSlide();
    bg(s);
    hdr(s,'後續建議　行動事項');
    const cs=['0EA5E9','F59E0B','10B981','6366F1'];
    const pos=[{x:.4,y:1.05},{x:6.95,y:1.05},{x:.4,y:4.18},{x:6.95,y:4.18}];
    recs.slice(0,4).forEach((r,i)=>{
      const {x,y}=pos[i];
      const c=cs[i];
      s.addShape('rect',{x,y,w:6.3,h:2.85,fill:{color:C.card},line:{color:c,width:1.5}});
      s.addShape('rect',{x,y,w:.6,h:.6,fill:{color:c},line:{color:c}});
      t(s,'0'+(i+1),x,y,.6,.6,{fontSize:16,color:'FFFFFF',bold:true,align:'center',valign:'middle'});
      t(s,r.title,x+.72,y+.1,5.4,.42,{fontSize:13,color:'FFFFFF',bold:true});
      t(s,r.content,x+.2,y+.68,5.9,2.0,{fontSize:10.5,color:'CBD5E1'});
    });
  }

  // ── S8: 結論 ────────────────────────────────
  {
    const s=pres.addSlide();
    bg(s,'050D1A');
    rect(s,0,0,W,.08,'0EA5E9');
    t(s,'結論',.5,.3,12,.55,{fontSize:22,color:'FFFFFF',bold:true});
    t(s,conclusion,.5,1.05,12.3,2.1,{fontSize:13,color:'CBD5E1',lineSpacingMultiple:1.6});

    const stats=[
      {val:names.length+'件',lbl:'媒體刊登',col:'0EA5E9'},
      {val:'¥'+Math.round(totalAdVal/10000*10)/10+'萬',lbl:'廣告換算',col:'10B981'},
      {val:'×'+roi,lbl:'費效倍率',col:'F59E0B'},
      {val:'¥'+cost.toLocaleString(),lbl:'發稿費用',col:'6366F1'},
    ];
    stats.forEach((st,i)=>{
      const x=.5+i*3.2;
      s.addShape('rect',{x,y:3.35,w:3.0,h:2.9,fill:{color:C.card},line:{color:st.col,width:2}});
      t(s,st.val,x+.1,3.55,2.8,1.5,{fontSize:38,color:st.col,bold:true,align:'center'});
      t(s,st.lbl,x+.1,5.15,2.8,.45,{fontSize:12,color:'94A3B8',align:'center'});
    });
    t(s,month+'　PR TIMES 配信成效報告（廣告換算基準：PR TIMES 官方換算表）',.5,6.95,12.3,.35,{fontSize:9,color:'334155'});
  }

  await pres.writeFile({fileName: name+'_PR成效報告_'+month+'.pptx'});
}

</script>
