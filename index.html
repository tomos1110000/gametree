<style>
:root{--bg:#07101f;--surf:#0f1c2e;--surf2:#162440;--card:#0c1828;--bord:#1a2f48;--teal:#0ea5e9;--teal2:#0369a1;--gold:#f59e0b;--grn:#10b981;--wht:#ffffff;--lt:#cbd5e1;--mute:#475569;--rad:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans TC',sans-serif;background:var(--bg);color:var(--lt);min-height:100vh;padding:2rem 1.5rem;max-width:920px;margin:0 auto}
.hd{margin-bottom:2rem}.hd h1{font-size:1.5rem;font-weight:700;color:#fff;margin-bottom:.3rem}
.hd p{color:var(--mute);font-size:.85rem;line-height:1.6}
.badge{display:inline-block;padding:.15rem .55rem;background:#0c2b5a;color:var(--teal);border-radius:4px;font-size:.72rem;font-weight:600;margin-left:.5rem;vertical-align:middle}
.step{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rad);padding:1.5rem;margin-bottom:1.1rem}
.step.act{border-color:var(--teal)}
.slbl{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
.snum{width:24px;height:24px;border-radius:50%;background:#0c2b5a;color:var(--teal);font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slbl h2{font-size:.9rem;font-weight:600;color:#fff}
.slbl p{font-size:.75rem;color:var(--mute);margin-top:.1rem}
label{display:block;font-size:.76rem;color:var(--mute);margin-bottom:.3rem;font-weight:500}
input[type=text],input[type=number],textarea{width:100%;background:var(--bg);border:1px solid var(--bord);border-radius:8px;color:var(--lt);font-size:.88rem;padding:.55rem .75rem;outline:none;font-family:inherit;transition:border-color .15s;resize:vertical}
input:focus,textarea:focus{border-color:var(--teal)}
textarea{line-height:1.6;min-height:110px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.btn-a{margin-top:.9rem;padding:.6rem 1.3rem;background:#0c2b5a;border:1px solid var(--teal);border-radius:8px;color:var(--teal);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-a:hover{background:#0e3d7a}.btn-a:disabled{opacity:.4;cursor:not-allowed}
.res{margin-top:1rem;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:1rem;display:none}
.res.show{display:block}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;margin-bottom:1rem}
.kcard{background:var(--bg);border:1px solid var(--bord);border-radius:8px;padding:.7rem;text-align:center}
.kcard .v{font-size:1.4rem;font-weight:700;color:var(--teal)}.kcard .l{font-size:.7rem;color:var(--mute);margin-top:.15rem}
.mtbl{width:100%;border-collapse:collapse;font-size:.78rem}
.mtbl th{text-align:left;color:var(--mute);font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;padding:.4rem .4rem;border-bottom:1px solid var(--bord)}
.mtbl td{padding:.3rem .4rem;border-bottom:1px solid #0c1828;vertical-align:middle}
.tbadge{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.7rem;font-weight:600}
.tA{background:#063f3a;color:#34d399}.tB{background:#0c2b5a;color:#60a5fa}.tC{background:#1e2435;color:#94a3b8}
.unmatched{color:#ef4444;font-style:italic}
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.info-label{font-size:.75rem;color:var(--mute)}
.info-val{font-size:.82rem;color:var(--lt);font-weight:500}
.match-stat{font-size:.75rem;color:var(--mute);margin-top:.5rem;padding:.5rem;background:var(--bg);border-radius:6px}
.match-stat b{color:var(--teal)}
.btn-gen{width:100%;margin-top:1.4rem;padding:.95rem;background:linear-gradient(135deg,#0284c7,#0369a1);border:none;border-radius:var(--rad);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn-gen:hover{opacity:.88}.btn-gen:disabled{opacity:.4;cursor:not-allowed}
.sbar{margin-top:.9rem;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;display:none}
.sbar.show{display:block}
.sbar.info{background:#0c2b5a;border:1px solid #1d4ed8;color:#93c5fd}
.sbar.ok{background:#052e16;border:1px solid #166534;color:#86efac}
.sbar.err{background:#2a0a0a;border:1px solid #7f1d1d;color:#fca5a5}
.spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.hint{font-size:.72rem;color:var(--mute);margin-top:.35rem}
.sec-ttl{font-size:.7rem;color:var(--teal);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
</style>
</head>

// ── Fuzzy match: try exact → partial → keyword ──
function findPrice(name) {
  // 1. exact
  if (PRICES[name] !== undefined) return { price: PRICES[name], key: name, mode: 'exact' };
  // 2. normalize: remove parens content and retry
  const norm = name.replace(/[（(][^）)]*[）)]/g, '').trim();
  if (norm !== name && PRICES[norm] !== undefined) return { price: PRICES[norm], key: norm, mode: 'partial' };
  // 3. find keys containing the name or name containing the key
  for (const [k, v] of Object.entries(PRICES)) {
    if (k.includes(name) || name.includes(k)) return { price: v, key: k, mode: 'fuzzy' };
  }
  // 4. try first 4+ chars match
  const short = name.slice(0, 4);
  if (short.length >= 4) {
    for (const [k, v] of Object.entries(PRICES)) {
      if (k.startsWith(short)) return { price: v, key: k, mode: 'keyword' };
    }
  }
  return null;
}

// ── Tier classification based on price ──
function getTier(price) {
  if (price >= 20000) return 'A梯';
  if (price >= 8000)  return 'B梯';
  return 'C梯';
}

function fmt(n) { return '¥' + n.toLocaleString(); }

  const el = document.getElementById('sb');

    line = line.trim();
    if (!line) return null;
    // Remove leading number + whitespace (e.g. "1  " or "27 ")
    line = line.replace(/^\d+\s+/, '');
    // If line contains a URL, take only the part before the URL
    const urlIdx = line.search(/https?:\/\//);
    if (urlIdx > 0) line = line.slice(0, urlIdx).trim();
    // If multiple tab/space-separated columns remain, the first column is the media name
    // Split by 2+ spaces or tab
    const cols = line.split(/\t|  +/);
    // First col is media name; second is usually company name (株式会社 etc) — skip it
    let mediaName = cols[0].trim();
    // Remove trailing company-like suffixes that might have been captured
    mediaName = mediaName.replace(/\s*(株式会社|有限会社|合同会社).*$/, '').trim();
    return mediaName || null;

    { title: '追蹤社群二次擴散', content: `配信後 7 日內追蹤各媒體的社群二次擴散數量（Twitter/X 轉推、Yahoo! JAPAN 引用等），評估實際觸及是否超出換算估算值` },

    { title: '建立媒體效益追蹤基準', content: `將本次 ${names.length} 件媒體換算值 ¥${totalAdVal.toLocaleString()} 作為基準線，後續每次配信後進行對比，追蹤是否因話題性不同而產生顯著差異` }
  ];

  stats.forEach((st,i)=>{const x=.5+i*3.2;card(s,x,3.7,3.0,2.8,{line:{color:st.c,width:1.5}});t(s,st.v,x+.1,3.95,2.8,1.4,{fontSize:38,color:st.c,bold:true,align:'center'});t(s,st.l,x+.1,5.3,2.8,.45,{fontSize:12,color:C.mute,align:'center'});});
  t(s,month+'　PR TIMES 配信成效報告（廣告換算値基準：PR TIMES 官方換算表）',.5,7.1,12,.3,{fontSize:9,color:C.mute});}

  await pres.writeFile({fileName: name+'_PR成效報告_'+month+'.pptx'});
}

function getTier(price){if(price>=20000)return 'A梯';if(price>=8000)return 'B梯';return 'C梯';}
function fmt(n){return '¥'+n.toLocaleString();}
